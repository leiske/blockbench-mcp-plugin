name: Deploy

on:
  push:
    branches: [main]
    tags: [v*]
  release:
    types: [published]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to build and attach to a GitHub release
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: "pages-${{ github.event_name }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build — runs on all events except PR close
  # ---------------------------------------------------------------------------
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.context.outputs.release_tag }}
      should_deploy: ${{ steps.permissions.outputs.should_deploy }}
    steps:
      - name: Determine deployment context
        id: context
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            echo "release_tag=${TAG}" >> $GITHUB_OUTPUT
            echo "checkout_ref=refs/tags/${TAG}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            TAG="${{ github.event.inputs.release_tag }}"
            echo "release_tag=${TAG}" >> $GITHUB_OUTPUT
            echo "checkout_ref=refs/tags/${TAG}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "release_tag=${TAG}" >> $GITHUB_OUTPUT
            echo "checkout_ref=${GITHUB_REF}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "release_tag=" >> $GITHUB_OUTPUT
            echo "checkout_ref=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          else
            echo "release_tag=" >> $GITHUB_OUTPUT
            echo "checkout_ref=${GITHUB_REF}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.context.outputs.checkout_ref }}

      - name: Check deploy permissions
        id: permissions
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName !== 'pull_request') {
              core.setOutput('should_deploy', 'true');
              return;
            }
            const author = context.payload.pull_request.user.login;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: author
              });
              const hasAccess = ['admin', 'write'].includes(data.permission);
              console.log(`PR author: ${author}, permission: ${data.permission}`);
              core.setOutput('should_deploy', hasAccess.toString());
            } catch (error) {
              const status = error.status ?? error.response?.status;
              if (status === 404 || status === 403) {
                console.log(`PR author ${author} is not a collaborator (HTTP ${status}), skipping deploy`);
              } else {
                console.error(`Failed to check permissions for ${author}:`, error.message);
              }
              core.setOutput('should_deploy', 'false');
            }

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build plugin
        run: bun run build

      - name: Stage deployment files
        run: |
          mkdir -p staging/plugin
          cp dist/mcp.js staging/plugin/
          for f in dist/about.md dist/icon.svg; do
            [ -f "$f" ] && cp "$f" staging/plugin/
          done

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockbench-mcp-plugin
          path: staging/
          retention-days: 30

  attach-release-assets:
    needs: build
    if: (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && needs.build.outputs.release_tag != '')) && needs.build.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: blockbench-mcp-plugin
          path: ./staging

      - name: Attach plugin assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          fail_on_unmatched_files: true
          files: |
            staging/plugin/mcp.js
            staging/plugin/about.md
            staging/plugin/icon.svg
